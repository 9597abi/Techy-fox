<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator</title>
    <link rel="stylesheet" href="cgpa.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html">
                    <img src="icons/logo.jpeg" alt="TechyFox logo">
                </a>
            </div>
            <ul class="navlinks">
                <li><a href="index.html" >Home</a></li>
                    <li><a href="services.html">Services</a></li>

        </nav>
    </header>
    <div class="container">
        <h1>CGPA Calculator</h1>
        <input type="text" id="sem1" placeholder="semester 1 gpa"

        step="0.01">
        <input type="text" id="sem3" placeholder="semester 3 gpa"

        <input type="text" id="sem8" placeholder="semester 8 gpa"
        step="0.01">
        <button onclick="calculateCGPA()">Calculate CGPA</button>

    </div>
